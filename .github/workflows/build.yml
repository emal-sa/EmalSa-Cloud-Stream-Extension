name: Build

concurrency:
  group: build
  cancel-in-progress: true

on:
  push:
    branches:
      - main
      - master
    paths-ignore:
      - "*.md"

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source
        uses: actions/checkout@v6.0.2
        with:
          path: src

      - name: Setup JDK 17
        uses: actions/setup-java@v5.2.0
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Android SDK
        uses: android-actions/setup-android@v4.0.1

      - name: Build plugins
        run: |
          cd "$GITHUB_WORKSPACE/src"
          chmod +x gradlew
          ./gradlew make makePluginsJson

      - name: Prepare builds branch
        run: |
          cd "$GITHUB_WORKSPACE"
          git clone "https://x-access-token:${{ github.token }}@github.com/${{ github.repository }}.git" builds
          cd builds
          git checkout --orphan builds
          find . -mindepth 1 ! -path "./.git*" -exec rm -rf {} +
          find "$GITHUB_WORKSPACE/src" -path "*/build/*.cs3" -exec cp {} . \;
          cp "$GITHUB_WORKSPACE/src/build/plugins.json" .

      - name: Publish builds
        run: |
          cd "$GITHUB_WORKSPACE/builds"
          git config user.email "actions@github.com"
          git config user.name "GitHub Actions"
          git add .
          git commit -m "Build $GITHUB_SHA" || exit 0
          git push origin builds --force
